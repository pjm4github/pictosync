just="spacing" textLength="257.2451" x="1177" y="1269.2051">which delegate to their ReadingSource.</text></g><!--entity Client--><g class="entity" data-qualified-name="Client" data-source-line="90" id="ent0041"><ellipse cx="548.7534" cy="1890.7373" fill="#FFFFFF" rx="8" ry="8" style="stroke:#000000;stroke-width:1;"/><path d="M548.7534,1898.7373 L548.7534,1925.7373 M535.7534,1906.7373 L561.7534,1906.7373 M548.7534,1925.7373 L535.7534,1940.7373 M548.7534,1925.7373 L561.7534,1940.7373" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="129.5068" x="484" y="1956.8125">Client Applications</text></g><g class="entity" data-qualified-name="GMN54" data-source-line="120" id="ent0055"><path d="M1487.5,1641.2373 L1487.5,1777.6318 L1858.8145,1777.6318 L1858.8145,1651.2373 L1848.8145,1641.2373 L1487.5,1641.2373" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1848.8145,1641.2373 L1848.8145,1651.2373 L1858.8145,1651.2373 L1848.8145,1641.2373" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="191.896" x="1493.5" y="1659.3071">On-demand read lifecycle:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="304.0654" x="1493.5" y="1675.1064">1. Delivery Manager asks HES to read a meter</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="273.8442" x="1493.5" y="1690.9058">2. HES routes through the comm network</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="350.3145" x="1493.5" y="1706.7051">3. SmartMeter produces a reading via ReadingSource</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="280.3696" x="1493.5" y="1722.5044">4. Response traverses back with simulated</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="255.7471" x="1507.2109" y="1738.3037">latency and failure rate per comm type</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="295.0898" x="1493.5" y="1754.103">5. HES delivers collected data to the promise</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="272.8604" x="1493.5" y="1769.9023">COMM_FAILURE meters: 80% failure rate</text></g><!--link ESM to GMN13--><g class="link" data-entity-1="ent0011" data-entity-2="ent0014" data-link-type="association" data-source-line="42" id="lnk15"><path d="M1343.7348,1058.2157 C1343.5725,1059.7047 1343.4092,1061.2031 1343.245,1062.7098 C1337.99,1110.9248 1331.8,1167.7173 1327.89,1203.5973" fill="none" id="ESM-GMN13" style="stroke:#000000;stroke-width:1;stroke-dasharray:7,7;"/></g><!--link DG to MP--><g class="link" data-entity-1="ent0003" data-entity-2="ent0012" data-link-type="dependency" data-source-line="96" id="lnk42"><path d="M1194,740.8273 C1194,792.1373 1194,855.4473 1194,904.6173" fill="none" id="DG-to-MP" style="stroke:#000000;stroke-width:1;"/><polygon fill="#000000" points="1194,910.6173,1198,901.6173,1194,905.6173,1190,901.6173,1194,910.6173" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="114.4102" x="1200.4177" y="786.8071">&#171;ReadingSource&#187;</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="125.2456" x="1195" y="802.6064">generates readings</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="117.6094" x="1198.8181" y="818.4058">(energy, demand,</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="107.2119" x="1204.0168" y="834.2051">voltage, quality)</text></g><!--link LM to MP--><g class="link" da