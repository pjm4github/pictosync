       review gate (amber): full height h=376
     ═══════════════════════════════════════════════ -->
<rect x="40" y="40" width="600" height="442" rx="12" class="box-purple"/>
<text class="th c-purple" x="60" y="63">pictosync v2 — agentic specification IDE</text>
<text class="ts c-purplesub" x="60" y="80">human-monitored agent orchestration · interconnection specifications</text>

<!-- LEFT TOP ROW — coral, y=94 h=66 -->
<rect x="60"  y="94" width="157" height="66" rx="7" class="box-coral"/>
<text class="th c-coral" x="138" y="116" text-anchor="middle">Agent workspace</text>
<text class="ts c-coral" x="138" y="131" text-anchor="middle">goal decomposition</text>
<text class="ts c-coral" x="138" y="146" text-anchor="middle">spec generation loop</text>

<rect x="237" y="94" width="157" height="66" rx="7" class="box-coral"/>
<text class="th c-coral" x="315" y="116" text-anchor="middle">Diagram canvas</text>
<text class="ts c-coral" x="315" y="131" text-anchor="middle">live spec rendering</text>
<text class="ts c-coral" x="315" y="146" text-anchor="middle">v1 SVGNodeRegistry</text>

<line x1="217" y1="127" x2="235" y2="127" class="arr" marker-end="url(#arrow)"/>

<!-- LEFT MID ROW — blue, y=176 h=84 -->
<rect x="60"  y="176" width="157" height="84" rx="7" class="box-blue"/>
<text class="th c-blue" x="138" y="198" text-anchor="middle">Goal editor</text>
<text class="ts c-blue" x="138" y="214" text-anchor="middle">objective hierarchy</text>
<text class="ts c-blue" x="138" y="229" text-anchor="middle">acceptance criteria</text>
<text class="ts c-blue" x="138" y="244" text-anchor="middle">safety bounds</text>

<rect x="237" y="176" width="157" height="84" rx="7" class="box-blue"/>
<text class="th c-blue" x="315" y="198" text-anchor="middle">Spec artifact store</text>
<text class="ts c-blue" x="315" y="214" text-anchor="middle">versioned diagrams</text>
<text class="ts c-blue" x="315" y="229" text-anchor="middle">decision log + diff</text>
<text class="ts c-blue" x="315" y="244" text-anchor="middle">lineage view</text>

<!-- vertical arrows top→mid -->
<line x1="138" y1="160" x2="138" y2="174" class="arr" marker-end="url(#arrow)"/>
<line x1="315" y1="160" x2="315" y2="174" class="arr" marker-end="url(#arrow)"/>

<!-- LEFT EXPORT BAR — blue, y=276 h=190 -->
<rect x="60" y="276" width="334" height="190" rx="7" class="box-blue"/>
<text class="th c-blue" x="227" y="297" text-anchor="middle">Export / handoff</text>
<text class="ts c-blue" x="227" y="313" text-anchor="middle">safety-critical systems</text>
<line x1="72" y1="320" x2="382" y2="320" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="3 3"/>
<text class="tb c-blue" x="227" y="337" text-anchor="middle">JSON schema</text>
<text class="tb c-blue" x="227" y="354" text-anchor="middle">SCADA descriptors</text>
<text class="tb c-blue" x="227" y="371" text-anchor="middle">domain-specific OT formats</text>
<text class="tb c-blue" x="227" y="388" text-anchor="middle">Mermaid source</text>
<text class="tb c-blue" x="227" y="405" text-anchor="middle">CVE / SBOM artifacts</text>
<text class="tb c-blue" x="227" y="422" text-anchor="middle">audit log package</text>

<!-- vertical arrows mid→export -->
<line x1="138" y1="260" x2="138" y2="274" class="arr" marker-end="url(#arrow)"/>
<line x1="315" y1="260" x2="315" y2="274" class="arr" marker-end="url(#arrow)"/>

<!-- RIGHT COLUMN — amber review gate, x=414 y=94 w=206 h=372 → bottom=466 < 482 ✓ -->
<rect x="414" y="94" width="206" height="372" rx="7" class="box-amber"/>
<text class="th c-amber" x="517" y="116" text-anchor="middle">Human review gate</text>
<text class="ts c-amber" x="517" y="132" text-anchor="middle">Approve · Reject · Redirect</text>
<text class="ts c-amber" x="517" y="147" text-anchor="middle">Annotate · Decision log</text>
<line x1="426" y1="155" x2="608" y2="155" stroke="#854F0B" stroke-width="0.5" stroke-dasharray="3 3"/>

<text class="ts c-amber" x="426" y="170" style="font-weight:600;">Safety standard checks:</text>

<text class="tb c-amber" x="428" y="188">▸ Memory safety enforced</text>
<text class="tb c-amber" x="428" y="204">▸ Injection prevention</text>
<text class="tb c-amber" x="428" y="220">▸ No hardcoded credentials</text>
<text class="tb c-amber" x="428" y="236">▸ MFA on privileged paths</text>
<text class="tb c-amber" x="428" y="252">▸ No exploitable deps (KEV)</text>
<text class="tb c-amber" x="428" y="268">▸ Audit log — safety events</text>
<text class="tb c-amber" x="428" y="284">▸ AI output validated first</text>
<text class="tb c-amber" x="428" y="300">▸ Goal traceability required</text>
<text class="tb c-amber" x="428" y="316">▸ Network-facing code reviewed</text>
<text class="tb c-amber" x="428" y="332">▸ SBOM current, CVEs assigned</text>
<text class="tb c-amber" x="428" y="348">▸ OT/IT segmentation verified</text>
<text class="tb c-amber" x="428" y="364">▸ Safe operating bounds set</text>
<text class="tb c-amber" x="428" y="380">▸ Spec approved before export</text>

<!-- arrow: review gate bottom → export bar right edge (L-bend) -->
<line x1="517" y1="466" x2="517" y2="478" class="arr"/>
<line x1="396" y1="478" x2="518" y2="478" class="arr"/>
<line x1="396" y1="466" x2="396" y2="478" class="arr" marker-end="url(#arrow)"/>

</svg>
