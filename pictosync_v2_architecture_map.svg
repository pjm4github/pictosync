<svg width="100%" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .th { font-family: sans-serif; font-size: 13px; font-weight: 500; }
    .ts { font-family: sans-serif; font-size: 11px; font-weight: 400; }
    .tb { font-family: sans-serif; font-size: 10px; font-weight: 400; }
    .arr { stroke: #888780; stroke-width: 0.8; fill: none; }
    .box-gray   { fill: #F1EFE8; stroke: #888780; stroke-width: 0.5; }
    .box-purple { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
    .box-teal   { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
    .box-coral  { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
    .box-blue   { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
    .box-amber  { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
    .c-gray     { fill: #2C2C2A; }
    .c-purple   { fill: #3C3489; }
    .c-purplesub{ fill: #534AB7; }
    .c-graymid  { fill: #5F5E5A; }
    .c-teal     { fill: #085041; }
    .c-coral    { fill: #712B13; }
    .c-blue     { fill: #0C447C; }
    .c-amber    { fill: #633806; }
  </style>
</defs>

<!-- ═══════════════════════════════════════════════
     V1 FOUNDATION  y=490–628
     outer gray box: x=40 w=600 h=138
     inner teal boxes: 4x w=130 gap=10 leftpad=20
     ═══════════════════════════════════════════════ -->
<rect x="40"  y="490" width="600" height="138" rx="12" class="box-gray"/>
<text class="th c-gray" x="60" y="512">pictosync v1 — diagram foundation</text>

<rect x="60"  y="524" width="130" height="88" rx="7" class="box-teal"/>
<text class="th c-teal" x="125" y="547" text-anchor="middle">ANTLR4 grammars</text>
<text class="ts c-teal" x="125" y="562" text-anchor="middle">Flowchart, State</text>
<text class="ts c-teal" x="125" y="577" text-anchor="middle">Sequence, C4</text>

<rect x="200" y="524" width="130" height="88" rx="7" class="box-teal"/>
<text class="th c-teal" x="265" y="547" text-anchor="middle">SVGNodeRegistry</text>
<text class="ts c-teal" x="265" y="562" text-anchor="middle">AST ↔ SVG</text>
<text class="ts c-teal" x="265" y="577" text-anchor="middle">bidirectional index</text>

<rect x="340" y="524" width="130" height="88" rx="7" class="box-teal"/>
<text class="th c-teal" x="405" y="547" text-anchor="middle">PyQt6 canvas</text>
<text class="ts c-teal" x="405" y="562" text-anchor="middle">QGraphicsScene</text>
<text class="ts c-teal" x="405" y="577" text-anchor="middle">render + interact</text>

<rect x="480" y="524" width="130" height="88" rx="7" class="box-teal"/>
<text class="th c-teal" x="545" y="547" text-anchor="middle">mmdc pipeline</text>
<text class="ts c-teal" x="545" y="562" text-anchor="middle">Mermaid → SVG</text>
<text class="ts c-teal" x="545" y="577" text-anchor="middle">non-headless</text>

<!-- builds-on arrow -->
<line x1="340" y1="488" x2="340" y2="452" class="arr" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
<text class="ts c-graymid" x="350" y="473">builds on</text>

<!-- ═══════════════════════════════════════════════
     V2 IDE LAYER  y=40–442
     outer purple: x=40 w=600 h=402
